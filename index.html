<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>MovieArea</title>
  <meta name="description" content="Responsive movie explorer with secure Cloudflare proxy API." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <header class="main-header">
    <div class="brand-row">
      <div>
        <h1><span class="brand-logo" aria-hidden="true">MA</span> MovieArea</h1>
        <p class="tagline">Live updates • movies • web series • anime</p>
      </div>
      <button id="backButton" class="btn ghost" type="button">Back</button>
    </div>

    <section class="hero-slider-wrap" aria-label="Header slider">
      <div id="heroSlider" class="hero-slider"></div>
    </section>
     <section class="quick-filters" aria-label="Quick filters">
    
      <button class="btn ghost quick-btn" type="button" data-quick="ultra_4k">4K Ultra HD MovieArea</button>
      
    </section>

    <section class="filters" aria-label="Search and filters">
      <select id="presetSelect" title="Content presets">
        <option value="all">All Feed</option>
        <option value="recent">Recent</option>
        <option value="trending_movies">Trending Movies</option>
        <option value="anime_feed">Anime Feed</option>
        <option value="holly_movies">Holly Movies Trend</option>
        <option value="bolly_movies">Bolly Movies Trend</option>
        <option value="holly_series">Holly Series Trend</option>
        <option value="bolly_series">Bolly Series Trend</option>
        <option value="south_movies">South Movies</option>
        <option value="south_series">South Series</option>
      </select>
      <select id="categoryFilter" title="Category filter">
        <option value="">All Categories</option>
      </select>
      <input id="searchInput" type="search" placeholder="Search movies / series..." autocomplete="off" />
      <input id="dateFilter" type="date" />
      <select id="yearFilter">
        <option value="">All Years</option>
      </select>
      <select id="monthFilter">
        <option value="">All Months</option>
      </select>
      <input id="platformInput" type="text" placeholder="Platform (optional)" />
      <button id="applyFilters" class="btn" type="button">Apply</button>
    </section>

   
  </header>

  <div class="layout-shell">
    <aside class="left-sidebar" id="leftSidebar" aria-label="Trending sidebar">
      <h2>Trending Movies</h2>
      <div id="sidebarTrending" class="sidebar-list"></div>
    </aside>

    <main id="app" class="app" aria-live="polite"></main>
  </div>

  <footer class="pagination-wrap" id="paginationWrap">
    <button id="prevPage" class="btn ghost" type="button">Previous</button>
    <div id="pageNumbers" class="page-numbers"></div>
    <button id="nextPage" class="btn ghost" type="button">Next</button>
    <input id="goPageInput" type="number" min="1" value="1" />
    <button id="goPage" class="btn" type="button">Go</button>
  </footer>

  <template id="cardTemplate">
    <article class="movie-card">
      <img class="poster" alt="" loading="lazy" referrerpolicy="no-referrer" />
      <div class="meta">
        <h2 class="title"></h2>
        <p class="date"></p>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
